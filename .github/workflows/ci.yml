name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn 1
        run: npm install -g yarn@1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Excalidraw packages
        run: bun run build:excalidraw

      - name: Validate
        run: bun run validate

      - name: Build plugin
        run: bun run build
